name: Translation library automation

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: translation-library-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  issue-review:
    if: ${{ github.event_name == 'issues' && !github.event.issue.pull_request && github.event.issue.state == 'open' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout translation library
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Guard issue label
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python workflow-scripts/github_issue_guard.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN"

      - name: Validate issue and update library files
        id: validate
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python workflow-scripts/library_submission_bot.py --event "$GITHUB_EVENT_PATH" --token "$GITHUB_TOKEN"

      - name: Comment on failed review
        if: ${{ steps.validate.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -f submission_result.json ]; then
            python - <<'PY' > issue-comment.md
          import hashlib
          import json
          from pathlib import Path
          from datetime import UTC, datetime

          data = json.loads(Path("submission_result.json").read_text(encoding="utf-8"))
          errors = [str(item) for item in data.get("errors", [])]
          fingerprint = hashlib.sha256("\n".join(errors).encode("utf-8")).hexdigest()[:16]
          checked_at = datetime.now(UTC).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          print(f"<!-- translation-library-issue-check:{fingerprint} -->")
          if data.get("retry_allowed"):
              print("自动检查未通过，但这些问题可以修正。")
              print()
          else:
              print("自动检查无法继续，此 issue 将被关闭。")
              print()
          print(f"- 检查时间：`{checked_at}`")
          if data.get("retry_allowed"):
              print("- 你可以直接编辑 open issue 的描述，或在评论区使用 `/update <类型> <参数>` 修正。")
              print("- 编辑描述时请只改字段内容，不要改 `### 字段标题`，否则机器人可能无法读取。")
          print()
          print("## 问题说明")
          print()
          for item in errors:
              print(f"- {item}")
          if data.get("retry_allowed"):
              print()
              print("## 常用修正命令")
              print()
              print("- `/update doc`：同一条评论附加新的 `UserGameStatsSchema_<app_id>.zip`")
              print("- `/update languages schinese, english, japanese`：用半角逗号写出文件里实际存在的全部语言")
              print("- `/update name <游戏名>`、`/update id <Steam app ID>`、`/update store <Steam 商店地址>`：修正基础信息")
          PY
          else
            printf "自动检查失败，但没有生成详细报告。\n" > issue-comment.md
          fi
          ISSUE_LOCKED="$(gh api "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER" --jq '.locked')"
          if [ "$ISSUE_LOCKED" = "true" ]; then
            echo "Issue #$ISSUE_NUMBER is already locked; skipping failure comment."
            exit 0
          fi
          ISSUE_MARKER="$(python -c 'from pathlib import Path; import re; text=Path("issue-comment.md").read_text(encoding="utf-8"); print(re.search(r"translation-library-issue-check:[0-9a-f]+", text).group(0) if "translation-library-issue-check:" in text else "")')"
          if [ -n "$ISSUE_MARKER" ] && gh api "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" --jq '.[].body' > issue-comments.txt; then
            if grep -Fq "$ISSUE_MARKER" issue-comments.txt; then
              echo "Issue #$ISSUE_NUMBER already has a failure comment for $ISSUE_MARKER; skipping duplicate."
              exit 0
            fi
          fi
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
          if [ -f submission_result.json ] && [ "$(python -c 'import json; print(str(json.load(open("submission_result.json", encoding="utf-8")).get("close_issue", False)).lower())')" = "true" ]; then
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
            gh api -X PUT "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/lock" -f lock_reason=resolved
          fi

      - name: Export PR metadata
        id: meta
        if: ${{ steps.validate.outcome == 'success' }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          data = json.loads(Path("submission_result.json").read_text(encoding="utf-8"))
          for key in ("branch", "pr_labels", "commit_message", "pr_title"):
              print(f"{key}={data[key]}")
          PY

      - name: Create pull request
        id: cpr
        if: ${{ steps.validate.outcome == 'success' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.meta.outputs.branch }}
          title: ${{ steps.meta.outputs.pr_title }}
          body-path: pr_body.md
          commit-message: ${{ steps.meta.outputs.commit_message }}
          labels: ${{ steps.meta.outputs.pr_labels }}
          reviewers: GaBoron
          add-paths: |
            files/**
            index.json
            INDEX.md
            INDEX_EN.md

      - name: Close and lock source issue
        if: ${{ steps.validate.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          {
            printf "自动检查已通过，PR 已创建并等待维护者审核：\n\n"
            printf "%s\n\n" "$PR_URL"
            printf "此 issue 已关闭并锁定。后续如需修改 PR 内容，请在 PR 下评论 \`/update <类型> <参数>\` 命令。\n"
          } > issue-comment.md
          ISSUE_STATE="$(gh api "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER" --jq '.state')"
          ISSUE_LOCKED="$(gh api "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER" --jq '.locked')"
          if [ "$ISSUE_LOCKED" = "true" ]; then
            echo "Issue #$ISSUE_NUMBER is already locked; skipping close-and-lock notification."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
          if [ "$ISSUE_STATE" != "CLOSED" ]; then
            gh issue close "$ISSUE_NUMBER" --reason "completed"
          fi
          gh api -X PUT "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/lock" -f lock_reason=resolved

  pr-review-requested-changes:
    if: ${{ github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested' && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'translation-library/') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Mark PR as waiting for update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python workflow-scripts/translation_pr_maintenance.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --mark-wait-for-update

  pr-review-approved:
    if: ${{ github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'translation-library/') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    concurrency:
      group: translation-library-main-finalize
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_AUTHOR: ${{ github.event.review.user.login }}
        run: |
          STATE="$(gh pr view "$PR_NUMBER" --json state --jq '.state')"
          if [ "$STATE" != "OPEN" ]; then
            echo "PR #$PR_NUMBER is already $STATE; skipping merge."
            exit 0
          fi
          DRAFT="$(gh pr view "$PR_NUMBER" --json isDraft --jq '.isDraft')"
          if [ "$DRAFT" = "true" ]; then
            echo "PR #$PR_NUMBER is still a draft; skipping merge."
            exit 0
          fi
          TITLE="$(gh pr view "$PR_NUMBER" --json title --jq '.title')"
          gh pr merge "$PR_NUMBER" --squash --delete-branch --subject "$TITLE" --body "Automatically merged after approval by @$REVIEW_AUTHOR."

      - name: Finalize merged PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MERGED="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.merged')"
          if [ "$MERGED" != "true" ]; then
            echo "PR #$PR_NUMBER is not merged; skipping finalization."
            exit 0
          fi
          git fetch origin main
          git checkout -B main origin/main
          python workflow-scripts/translation_pr_maintenance.py --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --finalize-pr "$PR_NUMBER"

  pr-comment-maintenance:
    if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Handle PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python workflow-scripts/translation_pr_maintenance.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --handle-comment

  issue-comment-maintenance:
    if: ${{ github.event_name == 'issue_comment' && !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Handle issue comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python workflow-scripts/github_issue_guard.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --handle-comment

  record-source-pr:
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'translation-library/') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    concurrency:
      group: translation-library-main-finalize
      cancel-in-progress: false
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Record source PR in index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python workflow-scripts/translation_pr_maintenance.py --event "$GITHUB_EVENT_PATH" --repo "$GITHUB_REPOSITORY" --token "$GITHUB_TOKEN" --mark-source-pr --lock-merged-pr
