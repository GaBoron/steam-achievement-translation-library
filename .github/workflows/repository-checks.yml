name: Repository checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Compile workflow scripts and tests
        run: python -m compileall -q workflow-scripts tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify translation data and generated indexes
        run: python workflow-scripts/check_repository.py
