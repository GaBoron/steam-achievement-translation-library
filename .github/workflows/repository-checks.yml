name: Repository checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-checks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ALLOW_UNINDEXED_SCHEMA_FILES: ${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'translation-library/') && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Compile workflow scripts and tests
        run: python -m compileall -q workflow-scripts tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify translation data and generated indexes
        run: |
          if [ "$ALLOW_UNINDEXED_SCHEMA_FILES" = "true" ]; then
            python workflow-scripts/check_repository.py \
              --allow-unindexed-schema-files \
              --allow-stale-index-metadata
          else
            python workflow-scripts/check_repository.py
          fi
