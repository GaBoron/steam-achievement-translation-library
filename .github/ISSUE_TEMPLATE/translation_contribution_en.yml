name: Submit Steam achievement translation
description: Upload a new UserGameStatsSchema_<app_id>.zip
title: "[Translation] Game name (Steam app ID)"
labels: [翻译投稿]
body:
  - type: markdown
    attributes:
      value: |
        Search `INDEX.md`, `index.json`, and open translation PRs for the Steam app ID before opening this issue. If automation finds a duplicate ID, it will comment and close this issue.

        Upload `UserGameStatsSchema_<app_id>.zip`. A single-version ZIP contains one matching `.bin`; a multi-version ZIP declares every version in `translation-variants.json`.
  - type: input
    id: game_name
    attributes:
      label: Game name
      description: Use the Steam store name. If the store name is not Chinese, you may append a Chinese translation after a space.
      placeholder: Steam store name optional translated name
    validations:
      required: true
  - type: input
    id: app_id
    attributes:
      label: Steam app ID
      description: Use digits only.
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store_url
    attributes:
      label: Steam store URL
      placeholder: https://store.steampowered.com/app/123456/
    validations:
      required: true
  - type: input
    id: languages
    attributes:
      label: Languages included in the uploaded file
      description: List every Steam language code that exists completely in the file. Use half-width commas only. Omitted languages are treated as absent.
      placeholder: schinese, english, japanese
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Common language codes: `schinese` Simplified Chinese, `tchinese` Traditional Chinese, `english` English, `japanese` Japanese, `koreana` Korean, `french` French, `german` German, `italian` Italian, `spanish` Spanish.

        Only list languages that are complete in the file. Separate multiple codes with half-width commas.
  - type: textarea
    id: schema_zip
    attributes:
      label: Achievement schema ZIP
      description: Upload `UserGameStatsSchema_<app_id>.zip`; use one matching `.bin` for a single version, or include `translation-variants.json` for multiple versions.
      placeholder: Drag the ZIP here.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Translation source, terminology notes, local testing notes, or anything maintainers should review.
