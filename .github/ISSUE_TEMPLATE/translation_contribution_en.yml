name: Submit Steam achievement translation
description: Upload a new UserGameStatsSchema_<app_id>.zip
title: "[Translation] Game name (Steam app ID)"
labels: [翻译投稿]
body:
  - type: markdown
    attributes:
      value: |
        Search `INDEX.md` or `index.json` for the Steam app ID before opening this issue.

        Upload `UserGameStatsSchema_<app_id>.zip`; the ZIP must contain exactly one matching `.bin` file.
  - type: input
    id: game_name
    attributes:
      label: Game name
      description: Use the Steam store name. If the store name is not Chinese, you may append a Chinese translation after a space.
      placeholder: Steam store name optional translated name
    validations:
      required: true
  - type: input
    id: app_id
    attributes:
      label: Steam app ID
      description: Use digits only.
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store_url
    attributes:
      label: Steam store URL
      placeholder: https://store.steampowered.com/app/123456/
    validations:
      required: true
  - type: checkboxes
    id: languages
    attributes:
      label: Languages included in the uploaded file
      options:
        - label: schinese
        - label: tchinese
        - label: english
        - label: japanese
        - label: koreana
  - type: input
    id: extra_languages
    attributes:
      label: Additional Steam language codes
      description: Separate multiple codes with commas. Enter none if not applicable.
      placeholder: none
  - type: textarea
    id: schema_zip
    attributes:
      label: Achievement schema ZIP
      description: Upload `UserGameStatsSchema_<app_id>.zip` containing exactly one matching `.bin` file.
      placeholder: Drag the ZIP here.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Translation source, terminology notes, local testing notes, or anything maintainers should review.
