name: Update existing Steam achievement translation
description: Upload a newer schema ZIP for an accepted game
title: "[Translation update] Game name (Steam app ID)"
labels: [更新文件]
body:
  - type: markdown
    attributes:
      value: |
        Use this template only for games already accepted into `index.json`. Open PRs do not count as accepted entries.

        If the uploaded file is identical to the current library file, automation will reject the update.
  - type: input
    id: game_name
    attributes:
      label: Game name
      description: Use the Steam store name. If the store name is not Chinese, you may append a Chinese translation after a space.
      placeholder: Steam store name optional translated name
    validations:
      required: true
  - type: input
    id: app_id
    attributes:
      label: Steam app ID
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store_url
    attributes:
      label: Steam store URL
      placeholder: https://store.steampowered.com/app/123456/
    validations:
      required: true
  - type: textarea
    id: update_summary
    attributes:
      label: Update summary
      description: Describe what changed, such as new achievements, removed achievements, translation fixes, or added language fields.
      placeholder: List the additions, removals, changes, or fixes.
    validations:
      required: true
  - type: input
    id: languages
    attributes:
      label: Languages included in the uploaded file
      description: List every Steam language code that exists completely in the file. Use half-width commas only. Omitted languages are treated as absent.
      placeholder: schinese, english, japanese
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Common language codes: `schinese` Simplified Chinese, `tchinese` Traditional Chinese, `english` English, `japanese` Japanese, `koreana` Korean, `french` French, `german` German, `italian` Italian, `spanish` Spanish.

        Only list languages that are complete in the file. Separate multiple codes with half-width commas.
  - type: input
    id: variant_id
    attributes:
      label: Version ID to update
      description: Fill this only when replacing one version of a game that already has multiple versions. Leave it blank for a full package update or a single-version game.
      placeholder: version-description
  - type: textarea
    id: schema_zip
    attributes:
      label: Achievement schema ZIP
      description: For one version, upload a ZIP containing one matching `.bin`. To replace the complete version set, include `translation-variants.json` in the ZIP.
      placeholder: Drag the ZIP here.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Source, local testing notes, or details maintainers should verify.
