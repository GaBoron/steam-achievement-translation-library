name: Report achievement file issue
description: Report that an accepted file may be outdated or may not work
title: "[File issue] Game name (Steam app ID)"
labels: [报告错误]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to report that an accepted library file may be outdated or may not work after replacement.

        This only changes the index status. To replace the file, use the update template.
  - type: input
    id: game_name
    attributes:
      label: Game name
      description: Use the Steam store name. If the store name is not Chinese, you may append a Chinese translation after a space.
      placeholder: Steam store name optional translated name
    validations:
      required: true
  - type: input
    id: app_id
    attributes:
      label: Steam app ID
      description: Must already exist in the accepted library index.
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store_url
    attributes:
      label: Steam store URL
      placeholder: https://store.steampowered.com/app/123456/
    validations:
      required: true
  - type: dropdown
    id: error_type
    attributes:
      label: Issue type
      description: Select the option that best matches the problem.
      options:
        - File may be outdated
        - File may not work
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Issue details
      description: For outdated files, include update or achievement-change evidence. For files that may not work, include replacement steps, observed behavior, and environment details.
      placeholder: Describe the evidence.
    validations:
      required: true
  - type: input
    id: reference
    attributes:
      label: Reference or source
      description: Steam news, update notes, screenshots, discussion links, or local file timestamp. Leave blank if unavailable.
      placeholder: https://store.steampowered.com/news/app/123456/
