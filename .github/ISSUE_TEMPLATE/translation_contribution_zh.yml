name: 提交 Steam 成就翻译
description: 上传一个新的 UserGameStatsSchema_<app_id>.zip
title: "[翻译投稿] 游戏名 (Steam app ID)"
labels: [翻译投稿]
body:
  - type: markdown
    attributes:
      value: |
        请先在 `INDEX.md`、`index.json` 和正在打开的翻译投稿 PR 中搜索 Steam app ID，确认没有相同游戏。自动化发现重复 ID 后会评论并关闭此 issue。

        上传文件必须是 `UserGameStatsSchema_<app_id>.zip`。单版本 ZIP 只放一个同名 `.bin`；多版本 ZIP 使用 `translation-variants.json` 声明全部版本。
  - type: input
    id: game_name
    attributes:
      label: 游戏名
      description: 按 Steam 商店显示填写；如果 Steam 显示名不是中文，可以在原名后空格间隔加上中文译名。
      placeholder: Steam 原名 中文译名
    validations:
      required: true
  - type: input
    id: app_id
    attributes:
      label: Steam app ID
      description: 只填写数字，可从 Steam 商店地址 `/app/<id>/` 取得。
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store_url
    attributes:
      label: Steam 商店地址
      description: 必须是 `https://store.steampowered.com/app/<Steam app ID>/...`。
      placeholder: https://store.steampowered.com/app/123456/
    validations:
      required: true
  - type: input
    id: languages
    attributes:
      label: 上传文件包含的语言
      description: 写出文件中已经完整包含成就名称和描述的全部 Steam 语言代码；必须使用半角逗号分隔。没写的语言会视为不存在。
      placeholder: schinese, english, japanese
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        常用语言代码：`schinese` 简体中文、`tchinese` 繁体中文、`english` 英语、`japanese` 日语、`koreana` 韩语、`french` 法语、`german` 德语、`italian` 意大利语、`spanish` 西班牙语。

        只填写文件里实际完整存在的语言；多个代码用半角逗号分隔。
  - type: textarea
    id: schema_zip
    attributes:
      label: 成就 schema ZIP
      description: 上传 `UserGameStatsSchema_<app_id>.zip`；单版本包只含一个同名 `.bin`，多版本包还需包含 `translation-variants.json`。
      placeholder: 请把 ZIP 拖到这里。
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 可填写翻译来源、术语说明、已自行测试的结果，或需要维护者注意的内容。
