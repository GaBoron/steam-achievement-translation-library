name: Translation petition
description: Upload a UserGameStatsSchema_<app_id>.bin that needs translation and receive a notification when it is accepted
title: "[Translation petition] Game name (Steam app ID)"
labels: [翻译请愿]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to request a community translation for a Steam achievement schema that is not yet in the library. Upload the original `.bin` generated by Steam without compressing it.

        The bot will confirm when the file is recognized. When a translation PR for the same Steam app ID is merged, this issue will be notified and closed automatically.
  - type: input
    id: game_name
    attributes:
      label: Game name
      description: Use the name shown in the Steam store.
      placeholder: Steam store game name
    validations:
      required: true
  - type: input
    id: app_id
    attributes:
      label: Steam app ID
      description: Use digits only and make sure it matches the ID in the uploaded filename.
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store_url
    attributes:
      label: Steam store URL
      placeholder: https://store.steampowered.com/app/123456/
    validations:
      required: true
  - type: input
    id: target_languages
    attributes:
      label: Requested target languages
      description: Use Steam language codes separated by half-width commas.
      placeholder: schinese
    validations:
      required: true
  - type: textarea
    id: schema_bin
    attributes:
      label: Achievement schema BIN to translate
      description: Upload the uncompressed `UserGameStatsSchema_<app_id>.bin`. Its app ID must match the field above.
      placeholder: Drag the BIN file here.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Terminology preferences, references, or anything translators should know.
