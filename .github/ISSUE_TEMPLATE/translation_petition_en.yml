name: Translation petition
description: Upload a UserGameStatsSchema_<app_id>.zip containing the BIN to translate and receive a notification when it is accepted
title: "[Translation petition] Game name (Steam app ID)"
labels: [翻译请愿]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to request a community translation for a Steam achievement schema that is not yet in the library. GitHub does not accept `.bin` attachments directly, so compress the original file generated by Steam into a ZIP first.

        The bot will confirm when the file is recognized. When a translation PR for the same Steam app ID is merged, this issue will be notified and closed automatically.
  - type: input
    id: game_name
    attributes:
      label: Game name
      description: Use the name shown in the Steam store.
      placeholder: Steam store game name
    validations:
      required: true
  - type: input
    id: app_id
    attributes:
      label: Steam app ID
      description: Use digits only and make sure it matches the filenames of both the ZIP and the BIN inside it.
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store_url
    attributes:
      label: Steam store URL
      placeholder: https://store.steampowered.com/app/123456/
    validations:
      required: true
  - type: input
    id: target_languages
    attributes:
      label: Requested target languages
      description: Use Steam language codes separated by half-width commas.
      placeholder: schinese
    validations:
      required: true
  - type: textarea
    id: schema_zip
    attributes:
      label: Achievement schema ZIP to translate
      description: Upload `UserGameStatsSchema_<app_id>.zip`. It must contain exactly one matching `UserGameStatsSchema_<app_id>.bin`.
      placeholder: Drag the ZIP file here.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Terminology preferences, references, or anything translators should know.
