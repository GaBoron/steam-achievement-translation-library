name: 报告成就文件错误
description: 报告已收录文件可能过期或替换后可能不生效
title: "[文件错误] 游戏名 (Steam app ID)"
labels: [报告错误]
body:
  - type: markdown
    attributes:
      value: |
        此模板用于报告库中已经收录的文件可能过期，或文件替换后可能不生效。

        此操作只会修改索引状态，不会替换文件。若你已经有新版文件，请使用“更新已有 Steam 成就翻译”模板。
  - type: input
    id: game_name
    attributes:
      label: 游戏名
      description: 按 Steam 商店显示填写；如果 Steam 显示名不是中文，可以在原名后空格间隔加上中文译名。
      placeholder: Steam 原名 中文译名
    validations:
      required: true
  - type: input
    id: app_id
    attributes:
      label: Steam app ID
      description: 必须是库里已经收录的 Steam app ID。
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store_url
    attributes:
      label: Steam 商店地址
      placeholder: https://store.steampowered.com/app/123456/
    validations:
      required: true
  - type: dropdown
    id: error_type
    attributes:
      label: 错误类型
      description: 选择最符合当前情况的类型。
      options:
        - 文件可能过期
        - 文件可能不生效
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 错误说明
      description: 说明观察到的问题；过期类可提供游戏更新或成就变化证据，不生效类请提供替换步骤、实际结果和复现环境。
      placeholder: 请写清观察到的变化、日期、版本号或复现信息。
    validations:
      required: true
  - type: input
    id: reference
    attributes:
      label: 参考来源
      description: 可填写 Steam 新闻、更新公告、截图链接、讨论链接或本地文件时间；没有可留空。
      placeholder: https://store.steampowered.com/news/app/123456/
