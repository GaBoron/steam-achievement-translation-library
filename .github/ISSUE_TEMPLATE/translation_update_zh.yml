name: 更新已有 Steam 成就翻译
description: 上传一个已收录游戏的新版 UserGameStatsSchema_<app_id>.zip
title: "[翻译更新] 游戏名 (Steam app ID)"
labels: [更新文件]
body:
  - type: markdown
    attributes:
      value: |
        此模板只用于更新已经合并进库的游戏。机器人会按 Steam app ID 检查 `index.json`；正在打开的 PR 不算已收录。

        如果上传文件与库里的当前文件完全相同，自动检查会拒绝创建 PR。
  - type: input
    id: game_name
    attributes:
      label: 游戏名
      description: 按 Steam 商店显示填写；如果 Steam 显示名不是中文，可以在原名后空格间隔加上中文译名。
      placeholder: Steam 原名 中文译名
    validations:
      required: true
  - type: input
    id: app_id
    attributes:
      label: Steam app ID
      placeholder: "123456"
    validations:
      required: true
  - type: input
    id: store_url
    attributes:
      label: Steam 商店地址
      placeholder: https://store.steampowered.com/app/123456/
    validations:
      required: true
  - type: textarea
    id: update_summary
    attributes:
      label: 更新内容摘要
      description: 说明这次更新了什么，例如游戏更新后新增成就、删除旧成就、修正翻译、补充语言字段等。
      placeholder: 请简要列出新增、删除、修改或修正的内容。
    validations:
      required: true
  - type: input
    id: languages
    attributes:
      label: 上传文件包含的语言
      description: 写出文件中已经完整包含成就名称和描述的全部 Steam 语言代码；必须使用半角逗号分隔。没写的语言会视为不存在。
      placeholder: schinese, english, japanese
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        常用语言代码：`schinese` 简体中文、`tchinese` 繁体中文、`english` 英语、`japanese` 日语、`koreana` 韩语、`french` 法语、`german` 德语、`italian` 意大利语、`spanish` 西班牙语。

        只填写文件里实际完整存在的语言；多个代码用半角逗号分隔。
  - type: input
    id: variant_id
    attributes:
      label: 要更新的版本 ID
      description: 仅在游戏已有多个版本、且本次只替换其中一个版本时填写；整包更新或单版本游戏留空。
      placeholder: with-unlock-conditions
  - type: textarea
    id: schema_zip
    attributes:
      label: 成就 schema ZIP
      description: 单版本更新上传只含同名 `.bin` 的 ZIP；整包更新多个版本时，ZIP 必须包含 `translation-variants.json`。
      placeholder: 请把 ZIP 拖到这里。
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 可填写来源、测试情况，或维护者需要额外核对的内容。
